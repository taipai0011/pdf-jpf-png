name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

# Production hosting is handled by Vercel (auto-deploys from main, plus PR
# previews). This workflow only verifies that the project installs, lints,
# and builds cleanly on every push and pull request.

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        # No lockfile is committed yet, so use `npm install`. Once a
        # package-lock.json is checked in we can switch back to `npm ci`
        # and re-enable the npm cache on actions/setup-node.
        run: npm install --no-audit --no-fund

      - name: Lint
        run: npm run lint --if-present
        continue-on-error: true

      - name: Build
        run: npm run build
